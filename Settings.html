<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <link rel="stylesheet" href="./CSS/Global.css">
    <link rel="stylesheet" href="./CSS/Settings.css">
    <script src="./JS/config.js"></script>
    <script src="./JS/Settings.js" defer></script>
</head>

<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo-container">
                <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                <span class="logo">EV Charge</span>
            </div>

            <div class="nav-icons">
                <div class="nav-icons">
                    <span class="icon" id="contact-btn">Contact</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="settings-main">
        <section class="settings-card">
            <div class="settings-header">
                <h1>Settings</h1>
                <p>Manage your EV Charge preferences.</p>
            </div>

            <div class="settings-list">
                <div class="setting-row">
                    <div>
                        <h3>Notifications</h3>
                        <p>Receive updates about reservations.</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="notifications-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <div>
                        <h3>Dark Mode</h3>
                        <p>Use a darker visual mode.</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="dark-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <div>
                        <h3>Save Favorite Stations</h3>
                        <p>Keep your favorite charging stations saved.</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="favorites-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button id="save-settings-btn" class="save-btn">Save Settings</button>
            <button id="back-btn" class="back-btn">Back</button>

            <p id="settings-result" class="settings-result hidden"></p>
        </section>
    </main>

    <footer class="main-footer">
        <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
    </footer>
</body>
</html>
