<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge - Login</title>

    <link rel="stylesheet" href="./CSS/Global.css">
    <link rel="stylesheet" href="./CSS/Login.css">

    <script src="./JS/config.js"></script>
    <script src="./JS/Login.js" defer></script>
</head>

<body class="login-page">
    <main class="main-content">
        <section class="welcome-section">
            <h1>Welcome Back! 👋</h1>
            <p>Please log in to manage your charging reservations.</p>
        </section>

        <form id="login-form" class="booking-form">
            <div id="error-message" class="error-box hidden"></div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="submit-btn">Log In</button>

            <div id="loading-spinner" class="spinner-container hidden">
                <div class="loading-text">Connecting to server, please wait... ⚡</div>
                <div class="spinner"></div>
            </div>

            <button type="button" class="signup-link-btn" id="signup-btn">
                Create New Account
            </button>
        </form>
    </main>
</body>
</html>
