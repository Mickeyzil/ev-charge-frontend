<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge - Login</title>

    <link rel="stylesheet" href="./CSS/Global.css">
    <link rel="stylesheet" href="./CSS/Login.css">
    <script src="./JS/config.js"></script>
    <script src="./JS/Login.js" defer></script>
</head>

<body>
    <div class="top-blue-container">
        <header class="main-header">
            <nav class="nav-container">
                <div class="logo-container">
                    <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                    <span class="logo">EV Charge</span>
                </div>

                <div class="nav-icons">
                    <button type="button" class="icon" id="contact-btn">Contact</button>
                    <button type="button" class="icon" id="settings-btn">Settings</button>
                </div>
            </nav>
        </header>

        <section class="welcome-section">
            <h1>Welcome Back! 👋</h1>
            <p>Please log in to manage your charging reservations.</p>
        </section>
    </div>

    <main class="main-content">
        <form id="login-form" class="booking-form">
            <div id="error-message" class="error-box hidden"></div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="submit-btn">Log In</button>

            <div id="loading-spinner" class="spinner-container hidden">
                <div class="loading-text">Connecting to server, please wait... ⚡</div>
                <div class="spinner"></div>
            </div>

            <button type="button" class="signup-link-btn" id="signup-btn">
                Create New Account</button>
        </form>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
        </div>
    </footer>
</body>
</html>
