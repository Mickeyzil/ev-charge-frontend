<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge - Login</title>
    <link rel="stylesheet" href="./CSS/global.css">
    <link rel="stylesheet" href="./CSS/Login.css">
</head>
<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo-container">
                <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                <span class="logo">EV Charge</span>
            </div>
            <div class="nav-icons">
                <span class="icon">Contact</span>
                <span class="icon">Settings</span>
            </div>
        </nav>
    </header>

    <main class="main-content">
        
        <section class="welcome-section">
            <h1>Welcome Back! 👋</h1>
            <p>Please log in to manage your charging reservations.</p>
        </section>

        <form id="login-form" class="booking-form">
            <div id="error-message" class="error-box hidden"></div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="submit-btn">Log In</button>
        </form>
    </main>

    <footer class="main-footer">
        <div class="footer-content">  
            <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
        </div>
    </footer>
</body>
</html>
