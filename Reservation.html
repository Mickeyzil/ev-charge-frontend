<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation Form</title>

  <link rel="stylesheet" href="./CSS/Reservation.css">
  <link rel="stylesheet" href="./CSS/Global.css">

  <script src="./JS/config.js"></script>
  <script src="./JS/Reservation.js" defer></script>
</head>

<body>
  <header class="main-header">
    <nav class="nav-container">
      <div class="logo-container">
        <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
        <span class="logo">EV Charge</span>
      </div>

      <div class="nav-icons">
        <span class="icon" id="contact-btn">Contact</span>
        <span class="icon" id="settings-btn">Settings</span>
      </div>
    </nav>
  </header>

  <main class="main-content">
    <div class="back-navigation">
      <button class="back-btn" id="back-stations-btn" type="button">
        &#9664; Back to nearby stations
      </button>
    </div>

    <section class="welcome-section">
      <h1 id="form-title">Book a Charging Station</h1>
      <p>Please fill in the details to secure your spot.</p>
    </section>

    <form id="reservation-form" class="booking-form">
      <div class="form-group">
        <label for="full-name">Name:</label>
        <input type="text" id="full-name" name="full-name" placeholder="User full name" required readonly>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="User email" required readonly>
      </div>

      <div class="form-group">
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="User phone number" required readonly>
      </div>

      <div class="form-group">
        <label for="arrival-date">Arrival Date:</label>
        <input type="date" id="arrival-date" name="arrival-date" required>
      </div>

      <div class="form-group">
        <label for="arrival-time">Arrival Time:</label>
        <input type="time" id="arrival-time" name="arrival-time" required>
      </div>

      <div class="form-group">
  <label for="car-type">Car Type:</label>
  <select id="car-type" name="car-type" required>
    <option value="">Select your car type</option>
    <option value="Tesla">Tesla</option>
    <option value="BYD">BYD</option>
    <option value="Geely">Geely</option>
    <option value="MG4">MG4</option>
    <option value="Hyundai">Hyundai</option>
    <option value="Other">Other</option>
  </select>
</div>
      <div class="form-group">
        <label for="connector-type">Connector Type:</label>
        <select id="connector-type" name="connector-type" required>
          <option value="">Select your connector type</option>
          <option value="CCS">CCS</option>
          <option value="CHAdeMO">CHAdeMO</option>
          <option value="Type2">Type2</option>
        </select>
      </div>

      <button type="submit" class="submit-btn">Confirm Reservation</button>
    </form>
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
    </div>
  </footer>
</body>

</html>
