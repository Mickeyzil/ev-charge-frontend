<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge - Register</title>

    <link rel="stylesheet" href="./CSS/Global.css">
    <link rel="stylesheet" href="./CSS/Register.css">

    <script src="./JS/Register.js" defer></script>
</head>

<body>
    <header class="main-header register-header">
        <nav class="nav-container">
            <div class="logo-container">
                <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                <span class="logo">EV Charge</span>
            </div>

            <div class="nav-icons">
                <span class="icon">Contact</span>
                <span class="icon">Settings</span>
            </div>
        </nav>
    </header>

    <main class="main-content register-page">
        <section class="register-title">
            <h1>Create Account ⚡</h1>
            <p>Join EV Charge and manage your charging reservations.</p>
        </section>

        <form id="register-form" class="register-form">
            <div id="register-message" class="register-message hidden"></div>

            <div class="form-group">
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="register-btn">Create Account</button>

            <button type="button" class="back-login-btn" id="back-login-btn">
                Back to Login
            </button>
        </form>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
        </div>
    </footer>
</body>
</html>
