<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map View</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link rel="stylesheet" href="./CSS/Global.css">
    <link rel="stylesheet" href="./CSS/MapView.css">
    <script src="./JS/config.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="./JS/MapView.js" defer></script>
</head>

<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo-container">
                <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                <span class="logo">EV Charge</span>
            </div>

            <div class="nav-icons"><span class="icon" id="contact-btn">Contact</span>
<span class="icon" id="settings-btn">Settings</span>
            </div>
        </nav>
    </header>

    <main class="main-content map-page">
        <div class="back-navigation">
            <button class="back-btn" id="back-main-btn">
                &#9664; Back to main menu
            </button>
        </div>

        <section class="map-hero">
            <h1>Map View 🗺️</h1>
            <p>Choose a nearby charging station from the map.</p>
        </section>

        <section class="map-panel">
            <h2>Filters</h2>

            <label for="map-search">Search Location</label>
            <input type="text" id="map-search" placeholder="🔍 Enter address or station name...">

            <label for="status-filter">Status</label>
            <select id="status-filter">
                <option value="all">All Stations</option>
                <option value="available">Available</option>
                <option value="partial">Partially Available</option>
                <option value="full">Fully Booked</option>
            </select>

            <div class="map-tabs">
                <button class="tab-btn active" type="button">🗺️ Map View</button>
                <button class="tab-btn" type="button">▭ Station Details</button>
            </div>
        </section>

        <section class="map-layout">
            <div id="leaflet-map" class="leaflet-map"></div>

            <div class="map-info-card" id="map-info-card">
                <h2 id="station-name">Select a station</h2>
                <p id="station-details">Click on one of the charging icons on the map.</p>

                <div class="map-info-row">
                    <span>Available:</span>
                    <strong id="station-available">-</strong>
                </div>

                <div class="map-info-row">
                    <span>Power:</span>
                    <strong id="station-power">-</strong>
                </div>

                <div class="map-info-row">
                    <span>Price:</span>
                    <strong id="station-price">-</strong>
                </div>

                <button class="map-reserve-btn" id="map-reserve-btn" disabled>
                    Make a Reservation
                </button>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
        </div>
    </footer>
</body>
</html>
