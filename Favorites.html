<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Stations</title>

    <link rel="stylesheet" href="./CSS/Global.css">
    <link rel="stylesheet" href="./CSS/Favorites.css">

    <script src="./JS/Favorites.js" defer></script>
</head>

<body>

    <header class="main-header">
        <nav class="nav-container">

            <div class="logo-container">
                <img src="./Images/Logo.png" alt="EV Charge Logo" class="logo-img">
                <span class="logo">EV Charge</span>
            </div>

            <div class="nav-icons">
                <span class="icon" id="contact-btn">Contact</span>
                <span class="icon" id="settings-btn">Settings</span>
            </div>

        </nav>
    </header>

    <main class="main-content favorites-page">

        <div class="back-navigation">
            <button class="back-btn" id="back-main-btn">
                &#9664; Back to main menu
            </button>
        </div>

        <section id="favorites-container" class="favorites-grid">
            <!-- Favorite stations will be inserted here -->
        </section>

    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>© 2026 EV Charge. All rights reserved to Mickey Zilberman and Gil Cohen.</p>
        </div>
    </footer>

</body>
</html>
